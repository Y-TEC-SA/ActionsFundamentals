name: Reuse other workflow

on:
  workflow_dispatch: # Permite ejecutar el workflow manualmente desde la pestaña Actions

jobs:
  call-workflow:
    uses: ./.github/workflows/reusable.yml
    with:
      who-to-greet: '@octocat'

  use-output:
    runs-on: ubuntu-latest
    needs: [call-workflow] # Es obligatorio para poder acceder a los outputs del job anterior
    steps:
      - name: Display time from reusable workflow
        run: echo "Time was ${{ needs.call-workflow.outputs.current-time }}"
 
